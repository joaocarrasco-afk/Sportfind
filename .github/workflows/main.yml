name: CI/CD Pipeline - Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  EXPO_NO_TELEMETRY: 1

jobs:
  validate:
    name: Lint, test & Expo build (Dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Expo SDK dependency versions
        run: npx expo install --check

      - name: Expo project health check
        run: npx expo-doctor

      - name: Run ESLint
        run: npm run lint

      - name: Verify JS bundle (Expo export)
        run: npx expo export --platform web

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
